<div class="select">
    <span>
      <igx-input-group #inputGroup [igxToggleAction]="dropDown" class="input-group">
        <input #input class="input" type="text" igxInput [igxDropDownItemNavigation]="dropDown" readonly="true"
          placeholder="Choose an option" [value]="type" (keydown.ArrowDown)="openDropDown()" />
        <igx-suffix igxButton="icon" class="dropdownToggleButton" igxRipple>
          <igx-icon>arrow_drop{{ dropDown.collapsed ? '_down' : '_up' }}</igx-icon>
        </igx-suffix>
      </igx-input-group>
      <!-- <span>Selected: {{ dropDown.selectedItem?.value }}</span> -->

      <igx-drop-down #dropDown (onSelection)="onDDLSelection($event)" [width]="'180px'">
        <igx-drop-down-item *ngFor="let item of items" [value]="item.field">
          {{ item.field }}
        </igx-drop-down-item>
      </igx-drop-down>
    </span>
  </div>
<igx-category-chart [dataSource]="chartData" [chartType]="type" title="Sector Details" width="100%" height="400px"
    AlignsGridLinesToPixels="true" yAxisMinimumValue="0" xAxisGap="2"  xAxisTitle="Date : 13/5/2020"  yAxisTitle="No of Industries by sector" xAxisTickLength="15" xAxisTitleAngle="0"
      >
   
</igx-category-chart>
